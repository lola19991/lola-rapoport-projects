securityGroups:
  - name: ssh-exposed-ipv4
    tags:
      owner: admin
    rules:
      - direction: inbound
        protocol: tcp
        port: 22
        cidr: 0.0.0.0/0
        description: SSH open to any IPv4

  - name: ssh-exposed-ipv6
    tags:
      team: ops
    rules:
      - direction: inbound
        protocol: tcp
        port: 22
        ipv6Cidr: ::/0
        description: SSH open to any IPv6

  - name: ssh-restricted-secure
    tags:
      owner: security
    rules:
      - direction: inbound
        protocol: tcp
        port: 22
        cidr: 203.0.113.0/24
        description: SSH restricted to corporate network
