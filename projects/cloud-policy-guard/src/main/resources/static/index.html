<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Policy Guard - Security Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
        }

        .upload-box:hover {
            border-color: #764ba2;
            background-color: #f0f2ff;
        }

        .upload-box.dragover {
            border-color: #764ba2;
            background-color: #e8ebff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: #999;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .btn {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn:hover {
            background-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .file-name {
            color: #667eea;
            font-weight: 500;
            margin-top: 15px;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 14px;
        }

        .results {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }

        .results.show {
            display: block;
        }

        .result-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .result-status {
            font-size: 32px;
        }

        .result-title {
            flex: 1;
        }

        .result-title h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .result-summary {
            color: #666;
            font-size: 14px;
        }

        .violation-list {
            margin-top: 15px;
        }

        .violation-item {
            background: white;
            padding: 15px;
            border-left: 4px solid #f39c12;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .violation-item.critical {
            border-left-color: #e74c3c;
        }

        .violation-item.high {
            border-left-color: #e67e22;
        }

        .violation-item.medium {
            border-left-color: #f39c12;
        }

        .violation-item.low {
            border-left-color: #3498db;
        }

        .violation-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .violation-details {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .violation-details strong {
            color: #333;
        }

        .error-alert {
            display: none;
            background-color: #ffebee;
            border-left: 4px solid #e74c3c;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            color: #c0392b;
            font-size: 14px;
        }

        .error-alert.show {
            display: block;
        }

        .close-results {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            float: right;
        }

        .close-results:hover {
            background-color: #764ba2;
        }

        .scan-id {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .upload-box {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Cloud Policy Guard</h1>
        <p class="subtitle">Upload a security group file (YAML or JSON) to scan for policy violations</p>

        <div class="error-alert" id="errorAlert"></div>

        <div class="upload-section">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Drag and drop your file here</div>
                <div class="upload-hint">or click to select (YAML or JSON)</div>
                <button class="btn" onclick="document.getElementById('fileInput').click()">Choose File</button>
                <input type="file" id="fileInput" class="file-input" accept=".yaml,.yml,.json">
                <div class="file-name" id="fileName"></div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Scanning your file...</div>
        </div>

        <div class="results" id="results">
            <button class="close-results" onclick="closeResults()">Close</button>
            <div class="result-header">
                <div class="result-status" id="resultStatus"></div>
                <div class="result-title">
                    <h2 id="resultTitle">Scan Complete</h2>
                    <div class="result-summary" id="resultSummary"></div>
                </div>
            </div>
            <div id="violationContainer"></div>
            <div class="scan-id" id="scanId"></div>
        </div>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorAlert = document.getElementById('errorAlert');

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // Handle drag and drop
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                handleFile(file);
            }
        });

        function handleFile(file) {
            const validExtensions = ['.yaml', '.yml', '.json'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();

            if (!validExtensions.includes(fileExtension)) {
                showError('Invalid file type. Please upload a YAML or JSON file.');
                return;
            }

            fileName.textContent = '✓ ' + file.name;
            scanFile(file);
        }

        async function scanFile(file) {
            hideError();
            loading.style.display = 'block';
            results.classList.remove('show');

            try {
                const fileContent = await file.text();
                const response = await fetch('/scans/upload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content: fileContent,
                        filename: file.name,
                        source: 'web-upload'
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Upload failed: ${response.statusText}`);
                }

                const result = await response.json();
                displayResults(result);
            } catch (error) {
                showError(error.message || 'An error occurred while scanning the file.');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayResults(result) {
            const violations = result.violations || [];
            const critical = violations.filter(v => v.severity === 'CRITICAL').length;
            const high = violations.filter(v => v.severity === 'HIGH').length;
            const medium = violations.filter(v => v.severity === 'MEDIUM').length;
            const low = violations.filter(v => v.severity === 'LOW').length;

            let statusIcon = '✓';
            let statusColor = '#27ae60';

            if (critical > 0) {
                statusIcon = '✕';
                statusColor = '#e74c3c';
            } else if (high > 0 || medium > 0) {
                statusIcon = '⚠';
                statusColor = '#e67e22';
            }

            document.getElementById('resultStatus').textContent = statusIcon;
            document.getElementById('resultStatus').style.color = statusColor;

            const summaryText = violations.length === 0
                ? 'No violations found'
                : `${violations.length} violation${violations.length !== 1 ? 's' : ''} found (${critical} critical, ${high} high, ${medium} medium, ${low} low)`;

            document.getElementById('resultSummary').textContent = summaryText;
            document.getElementById('scanId').textContent = `Scan ID: ${result.id}`;

            const violationContainer = document.getElementById('violationContainer');
            if (violations.length === 0) {
                violationContainer.innerHTML = '<p style="color: #27ae60; text-align: center; padding: 20px;">✓ All security policies passed!</p>';
            } else {
                violationContainer.innerHTML = violations.map(v => `
                    <div class="violation-item ${v.severity.toLowerCase()}">
                        <div class="violation-title">${v.severity} - ${v.rule}</div>
                        <div class="violation-details">
                            <strong>Group:</strong> ${v.resource || 'N/A'}<br>
                            <strong>Message:</strong> ${v.message || 'N/A'}<br>
                            ${v.details?.cidr ? `<strong>CIDR:</strong> ${v.details.cidr}<br>` : ''}
                            ${v.details?.ports ? `<strong>Ports:</strong> ${v.details.ports}<br>` : ''}
                            ${v.details?.direction ? `<strong>Direction:</strong> ${v.details.direction}<br>` : ''}
                            ${v.recommendation ? `<strong>Recommendation:</strong> ${v.recommendation}<br>` : ''}
                        </div>
                    </div>
                `).join('');
            }

            results.classList.add('show');
        }

        function closeResults() {
            results.classList.remove('show');
            fileName.textContent = '';
            fileInput.value = '';
        }

        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.classList.add('show');
        }

        function hideError() {
            errorAlert.classList.remove('show');
        }
    </script>
</body>
</html>
