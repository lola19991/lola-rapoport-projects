name: Policy Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Unit tests
        run: ./mvnw -B test
      - name: Build executable jar
        run: ./mvnw -B -DskipTests package

  localstack-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: AWS SDK integration test with LocalStack
        run: ./mvnw -B -Pintegration-tests verify

  sarif-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build scanner
        run: ./mvnw -B -DskipTests package
      - name: Generate SARIF from example policy
        run: java -jar target/cloud-policy-guard.jar scan examples/security-groups.yaml --format sarif --output policy-guard.sarif --fail-on none
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: policy-guard.sarif
